<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Love Jump</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="score-board">高度: <span id="score">0</span> m</div>
            <div id="start-screen">
                <h1>☁️ 云端恋人 ☁️</h1>
                <p>点击或按空格开始</p>
                <p class="instruction">左右移动接住爱心，躲避乌云</p>
                <p class="instruction" style="font-size: 12px; margin-top: 5px;">🎵 建议佩戴耳机体验最佳音效</p>
            </div>
            <div id="game-over-screen" style="display: none;">
                <h1>这里是终点吗？</h1>
                <p>不，爱没有终点</p>
                <p>最终高度: <span id="final-score">0</span> m</p>
                <button id="restart-btn">再次起飞</button>
            </div>
        </div>
        <!-- 背景音乐播放器 -->
        <audio id="bgm" loop>
            <source src="bgm.mp3" type="audio/mpeg">
        </audio>
    </div>
    <script src="static/js/game.js"></script>
</body>
</html>
